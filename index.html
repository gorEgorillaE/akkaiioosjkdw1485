<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Streckkodsläsare</title>
  <script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>
</head>
<body>

<h2>Skanna streckkod</h2>
<div id="scanner" style="width:100%; height:300px;"></div>

<script>
  const SPECIAL_KOD = "safevery148163267"; // ← ändra till din kod

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.querySelector('#scanner'),
    },
    decoder: {
      readers: ["code_128_reader", "ean_reader", "ean_8_reader"]
    }
  }, function(err) {
    if (err) {
      console.log(err);
      return;
    }
    Quagga.start();
  });

  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;
    console.log("Hittad kod:", code);

    if (code === SPECIAL_KOD) {
      window.location.href = "https://exempel.se"; // ← sidan du vill till
    }
  });
</script>

</body>
</html>
